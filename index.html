<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포욘님-아트머그</title>

    <link rel="stylesheet" href="./static/css/common.css">
</head>
<body>
    <main class="main">
        <section class="sec" id="introSection"></section>
        <section class="sec" id="noticeSection"></section>

        <section class="processSection">
            <div class="inner">

                <div class="processWrap">

                <div class="processEar processEar--left"></div>
                <div class="processEar processEar--right"></div>

                <div class="processHeader">
                    <div class="processBadge">Work Process</div>
                    <h2 class="processTitle">작업 과정</h2>
                </div>

                <div class="processGrid">

                    <div class="processCard">
                    <div class="stepNum">1</div>
                    <h3>문의</h3>
                    <p>문의 양식 제출</p>
                    </div>

                    <div class="processCard">
                    <div class="stepNum">2</div>
                    <h3>안내 및 입금</h3>
                    <p>견적 안내 및 입금 진행</p>
                    </div>

                    <div class="processCard">
                    <div class="stepNum">3</div>
                    <h3>시안 전달 후 컨펌</h3>
                    <p>최대 2번 수정 가능</p>
                    </div>

                    <div class="processCard">
                    <div class="stepNum">4</div>
                    <h3>일러스트 완성 후 컨펌</h3>
                    <p>파츠분리 전 상태<br>최대 1번 수정 가능</p>
                    </div>

                    <div class="processCard">
                    <div class="stepNum">5</div>
                    <h3>파츠 분리</h3>
                    <p>리깅 작업을 위한 파츠 정리</p>
                    </div>

                    <div class="processCard">
                    <div class="stepNum">6</div>
                    <h3>완성 후 파일 전달</h3>
                    <p>작업 전달 및 PNG 파일 제공</p>
                    </div>

                </div>

                </div>

            </div>
        </section>
        
        <section class="sec" id="collabSection"></section>
        <section class="sec" id="sampleSection"></section>
        <section class="sec" id="formSection"></section>
    </main>

<script src="./static/js/app.js" defer></script>
</body>
</html>
